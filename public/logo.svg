<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&amp;display=swap');
    </style>
    <!-- Background Gradient -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A7F3D0" />
      <stop offset="100%" stop-color="#2DD4BF" />
    </linearGradient>
    
    <!-- Lettering Gradient -->
    <linearGradient id="text_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#99F6E4" />
      <stop offset="30%" stop-color="#A7F3D0" />
      <stop offset="45%" stop-color="#FFFFFF" />
      <stop offset="55%" stop-color="#FFFFFF" />
      <stop offset="70%" stop-color="#A2F1D5" />
      <stop offset="100%" stop-color="#99F6E4" />
    </linearGradient>

    <!-- Glossy Overlay -->
    <linearGradient id="gloss_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5" />
      <stop offset="45%" stop-color="white" stop-opacity="0.1" />
      <stop offset="55%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <!-- Drop Shadow for Letters -->
    <filter id="shadow_bold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="8" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg_grad)"/>
  
  <!-- Gloss reflection layer -->
  <path d="M0 120C0 53.7 53.7 0 120 0H392C458.3 0 512 53.7 512 120V240C512 240 380 320 256 320C132 320 0 240 0 240V120Z" fill="url(#gloss_grad)" />

  <!-- Letters F and S -->
  <g filter="url(#shadow_bold)">
    <!-- F placed higher -->
    <text x="80" y="300" 
          font-family="'Fredoka', sans-serif" 
          font-weight="700" 
          font-size="280" 
          fill="url(#text_grad)" 
          stroke="#1E293B" 
          stroke-width="16" 
          stroke-linejoin="round"
          paint-order="stroke fill">F</text>
    
    <!-- S placed lower -->
    <text x="250" y="380" 
          font-family="'Fredoka', sans-serif" 
          font-weight="700" 
          font-size="280" 
          fill="url(#text_grad)" 
          stroke="#1E293B" 
          stroke-width="16" 
          stroke-linejoin="round"
          paint-order="stroke fill">S</text>
  </g>
</svg>
